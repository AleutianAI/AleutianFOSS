# Container-Based Integration Test Stack (Host Network Mode)
# Spins up 9 trace containers (one per FOSS test project) against a shared
# Ollama instance, then runs YAML-defined test suites via a sidecar container.
#
# Uses network_mode: host so containers can reach Ollama at localhost:11434.
# Each trace container binds to a unique port (12301-12309) via the PORT env var.
#
# Usage:
#   podman-compose -f test/integration/podman-compose.test.yml up --abort-on-container-exit
#
# Prerequisites:
#   - Ollama running on host (port 11434)
#   - 9 FOSS projects cloned at ~/trace_test/ (flat layout)

x-trace-common: &trace-common
  image: aleutian-trace:latest
  network_mode: host
  environment: &trace-env
    OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
    OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:20b}
    TRACE_ROUTER_MODEL: ${ROUTER_MODEL:-granite4:micro-h}
    TRACE_PARAM_MODEL: ${PARAM_EXTRACTOR_MODEL:-ministral-3:3b}
    LSP_ENABLED: "true"
    LSP_PYTHON_ENABLED: "true"
    LSP_TYPESCRIPT_ENABLED: "true"
  restart: "no"

services:
  # ── Go Projects ──

  trace-hugo:
    <<: *trace-common
    container_name: trace-hugo
    environment:
      <<: *trace-env
      PORT: "12301"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12301/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/hugo:/projects:ro

  trace-badger:
    <<: *trace-common
    container_name: trace-badger
    environment:
      <<: *trace-env
      PORT: "12302"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12302/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/badger:/projects:ro

  trace-gin:
    <<: *trace-common
    container_name: trace-gin
    environment:
      <<: *trace-env
      PORT: "12303"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12303/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/gin:/projects:ro

  # ── Python Projects ──

  trace-flask:
    <<: *trace-common
    container_name: trace-flask
    environment:
      <<: *trace-env
      PORT: "12304"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12304/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/flask:/projects:ro

  trace-pandas:
    <<: *trace-common
    container_name: trace-pandas
    environment:
      <<: *trace-env
      PORT: "12305"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12305/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/pandas:/projects:ro

  # ── JavaScript Projects ──

  trace-express:
    <<: *trace-common
    container_name: trace-express
    environment:
      <<: *trace-env
      PORT: "12306"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12306/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/express:/projects:ro

  trace-babylonjs:
    <<: *trace-common
    container_name: trace-babylonjs
    environment:
      <<: *trace-env
      PORT: "12307"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12307/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/Babylon.js:/projects:ro

  # ── TypeScript Projects ──

  trace-nestjs:
    <<: *trace-common
    container_name: trace-nestjs
    environment:
      <<: *trace-env
      PORT: "12308"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12308/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/nestjs:/projects:ro

  trace-plottable:
    <<: *trace-common
    container_name: trace-plottable
    environment:
      <<: *trace-env
      PORT: "12309"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12309/v1/trace/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    volumes:
      - ${CRS_TEST_CODEBASES:-~/trace_test}/plottable:/projects:ro

  # ── Test Runner Sidecar ──

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    container_name: test-runner
    network_mode: host
    depends_on:
      trace-hugo:
        condition: service_healthy
      trace-badger:
        condition: service_healthy
      trace-gin:
        condition: service_healthy
      trace-flask:
        condition: service_healthy
      trace-pandas:
        condition: service_healthy
      trace-express:
        condition: service_healthy
      trace-babylonjs:
        condition: service_healthy
      trace-nestjs:
        condition: service_healthy
      trace-plottable:
        condition: service_healthy
    environment:
      # URLs use localhost since all containers share the host network
      TRACE_HUGO_URL: http://localhost:12301
      TRACE_BADGER_URL: http://localhost:12302
      TRACE_GIN_URL: http://localhost:12303
      TRACE_FLASK_URL: http://localhost:12304
      TRACE_PANDAS_URL: http://localhost:12305
      TRACE_EXPRESS_URL: http://localhost:12306
      TRACE_BABYLONJS_URL: http://localhost:12307
      TRACE_NESTJS_URL: http://localhost:12308
      TRACE_PLOTTABLE_URL: http://localhost:12309
      # Optional: filter which projects/features to test
      PROJECT_FILTER: ${PROJECT_FILTER:-}
      FEATURE_FILTER: ${FEATURE_FILTER:-}
      MAX_TESTS: ${MAX_TESTS:-}
    volumes:
      - ../../scripts/test_langs:/tests:ro
    restart: "no"
