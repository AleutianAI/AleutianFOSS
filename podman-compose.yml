# Aleutian Local - Base RAG Configuration
# Simplified compose for knowledge base / RAG use case with Ollama
#
# Prerequisites:
#   - Ollama running on host (for LLM and embeddings)
#   - Podman secrets configured: podman secret create aleutian_hf_token ~/.hf_token
#
# Usage:
#   aleutian stack start                    # Start all services (auto-pulls models)
#   aleutian ingest ./docs                  # Ingest documents
#   aleutian chat                           # Start chatting
#
# Ports (12210 block):
#   12210 - Orchestrator API
#   12211 - RAG Engine
#   12212 - Weaviate HTTP
#   12213 - Weaviate gRPC
#   12214 - Jaeger UI
#   12215 - Prometheus
#   12216 - Grafana
#   12217 - Trace Server
#   12218 - Trace Proxy (OpenAI-compatible API)
#
# Network:
#   Creates "aleutian-shared" network for cross-project connectivity.
#   Sapheneia and other external projects attach to this network.

secrets:
  aleutian_hf_token:
    external: true

services:
  # === Vector Database ===
  # Stores document embeddings for semantic search
  # Pin to 1.35.1+ for native TTL support (document retention)
  # See: https://docs.weaviate.io/weaviate/manage-collections/time-to-live
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.35.1
    container_name: aleutian-weaviate
    ports:
      - "12212:8080"
      - "12213:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "weaviate"
      # CRS-26h: No vectorizer modules needed. All classes use vectorizer "none"
      # with pre-computed vectors supplied at insert time via the orchestrator.
    networks:
      - aleutian-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # === RAG Engine ===
  # Python service that handles retrieval and generation pipelines
  rag-engine:
    build:
      context: ./services/rag_engine
      dockerfile: Dockerfile
    container_name: aleutian-rag-engine
    ports:
      - "12211:8000"
    environment:
      # Connections
      WEAVIATE_SERVICE_URL: http://weaviate:8080
      EMBEDDING_SERVICE_URL: http://host.containers.internal:11434/api/embed
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text-v2-moe}
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      # LLM Config - Ollama on host
      LLM_BACKEND_TYPE: ollama
      OLLAMA_BASE_URL: http://host.containers.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss}
      # Pipeline Config
      LLM_DEFAULT_TEMPERATURE: 0.7
      LLM_DEFAULT_MAX_TOKENS: 2048
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
      RERANK_INITIAL_K: 20
      RERANK_FINAL_K: 5
      # Verified Pipeline Role Temperatures (uncomment to override defaults)
      # Lower = more deterministic, Higher = more creative
      # All default to 0.6 for model compatibility (some models fail below 0.5)
      # VERIFIED_OPTIMIST_TEMPERATURE: 0.6  # Draft generation (creative)
      # VERIFIED_SKEPTIC_TEMPERATURE: 0.6   # Verification audit (deterministic)
      # VERIFIED_REFINER_TEMPERATURE: 0.6   # Hallucination correction (balanced)
    volumes:
      - models_cache:/root/.cache/huggingface
    networks:
      - aleutian-network
    restart: unless-stopped
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  # === Orchestrator ===
  # Go service that coordinates all components and exposes the API
  orchestrator:
    build:
      context: .
      dockerfile: ./services/orchestrator/Dockerfile
    container_name: aleutian-go-orchestrator
    ports:
      - "12210:12210"
    environment:
      PORT: 12210
      # Service URLs
      WEAVIATE_SERVICE_URL: http://weaviate:8080
      RAG_ENGINE_URL: http://rag-engine:8000
      EMBEDDING_SERVICE_URL: http://host.containers.internal:11434/api/embed
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text-v2-moe}
      # LLM Config - Ollama on host
      LLM_BACKEND_TYPE: ollama
      OLLAMA_BASE_URL: http://host.containers.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss}
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    volumes:
      - ./services/policy_engine/data_classification_patterns.yaml:/app/data_classification_patterns.yaml:ro
    networks:
      - aleutian-network
    restart: unless-stopped
    depends_on:
      rag-engine:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12210/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  # === Trace Server ===
  # AST-powered code intelligence with LLM agent capabilities
  trace:
    build:
      context: .
      dockerfile: ./services/trace/Dockerfile
    container_name: aleutian-trace
    ports:
      - "12217:12217"
    environment:
      PORT: 12217
      WEAVIATE_SERVICE_URL: http://weaviate:8080
      # CRS-26g/i: RAG symbol + query embeddings route through orchestrator /v1/embed
      ORCHESTRATOR_URL: http://orchestrator:12210
      # Tool routing embeddings (routing/embedder.go) call Ollama directly
      EMBEDDING_SERVICE_URL: http://host.containers.internal:11434/api/embed
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text-v2-moe}
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OLLAMA_BASE_URL: http://host.containers.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss}
      TRACE_ALLOWED_ROOTS: /projects
      NATS_URL: nats://nats:4222
      # GR-75: LSP enrichment configuration for container mode.
      # Language servers (pyright, tsserver) are bundled in the image.
      # LSP is stdio-based — no new ports or volume mounts needed.
      LSP_ENABLED: "true"
      LSP_PYTHON_ENABLED: "true"
      LSP_TYPESCRIPT_ENABLED: "true"
      LSP_STARTUP_TIMEOUT_SECONDS: "30"
      LSP_REQUEST_TIMEOUT_SECONDS: "5"
      # GR-77a: Graph persistence directories inside the container.
      # TRACE_DATA_DIR is mounted as a named volume (trace_data) for persistence.
      TRACE_BBOLT_DIR: /data/graphs
      TRACE_SNAPSHOT_DIR: /data/snapshots
    volumes:
      - ${TRACE_PROJECTS_DIR:-.}:/projects:ro
      - trace_data:/data
    networks:
      - aleutian-network
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12217/v1/trace/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  # === Trace Proxy ===
  # OpenAI-compatible API proxy — speaks /v1/chat/completions
  # Connects OpenWebUI, Continue, aider, curl to the trace agent
  trace-proxy:
    build:
      context: .
      dockerfile: services/trace/Dockerfile
    container_name: aleutian-trace-proxy
    ports:
      - "12218:12218"
    environment:
      ALEUTIAN_TRACE_URL: http://trace:12217
      OLLAMA_URL: http://host.containers.internal:11434
      TRACE_CONTAINER_PREFIX: /projects
      TRACE_SKIP_AUTO_INIT: "true"  # CRS-26n: stack manager handles init directly
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    volumes:
      - ${TRACE_PROJECTS_DIR:-.}:/projects:ro,Z
    command: ["/app/trace-proxy", "--project-root", "/projects"]
    depends_on:
      trace:
        condition: service_healthy
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      - aleutian-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:12218/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # === NATS JetStream ===
  # CRS-27: NATS for CRS delta streaming and state persistence
  nats:
    image: nats:2.10-alpine
    container_name: aleutian-nats
    ports:
      - "4222:4222"    # Client connections
      - "8222:8222"    # HTTP monitoring
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    volumes:
      - nats_data:/data
    networks:
      - aleutian-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Observability (Minimal) ===
  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: aleutian-jaeger
    ports:
      - "12214:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - aleutian-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  weaviate_data: {}
  models_cache: {}
  nats_data: {}
  trace_data: {}

networks:
  aleutian-network:
    driver: bridge
    name: aleutian-shared
